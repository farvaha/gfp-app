name: Probe WAF

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Chunk size threshold
        run: |
          for mb in 8 16 24 32; do
            head -c ${mb}000000 /dev/zero > f.bin
            echo "=== ${mb}MB ==="
            curl -sS -o resp.txt -w "HTTP:%{http_code}\n" --max-time 180 -X POST -H "X-GFP-Deploy: probe" -H "Content-Type: application/octet-stream" --data-binary @f.bin "https://getfitplans.com/wp-json/gfp/v1/app-apk-chunk?buildId=deadbeef&idx=0" || echo "CURLEXIT:$?"
            head -c 150 resp.txt || true; echo
          done
