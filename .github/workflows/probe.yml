name: Probe WAF

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Chunk size threshold
        run: |
          for mb in 8 16 24 32; do
            head -c ${mb}000000 /dev/zero > f.bin
            echo "=== ${mb}MB ==="
            curl -sS -o resp.txt -w "HTTP:%{http_code}\n" --max-time 180 -X POST -H "X-GFP-Deploy: probe" -H "Content-Type: application/octet-stream" --data-binary @f.bin "https://getfitplans.com/wp-json/gfp/v1/app-apk-receive" || echo "CURLEXIT:$?"
            head -c 150 resp.txt || true; echo
          done
name: Probe WAF

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Cookie jar redirect test
        run: |
          head -c 95000000 /dev/zero > big.bin
          curl -sS -o resp.txt -w "HTTP:%{http_code} REDIRS:%{num_redirects}\n" -L --max-redirs 10 -c jar.txt -b jar.txt -X POST -H "X-GFP-Deploy: probe" -F "apk=@big.bin;filename=t.apk" https://getfitplans.com/wp-json/gfp/v1/app-apk-receive || echo "CURLEXIT:$?"
          head -c 300 resp.txt; echo
          echo COOKIELINES:$(grep -c . jar.txt || true)
