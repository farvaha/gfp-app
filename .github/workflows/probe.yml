name: Probe WAF

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch source probe
        run: |
          echo '--- default curl UA ---'
          curl -sSL -o s1.zip -w "HTTP:%{http_code} SIZE:%{size_download}\n" "https://getfitplans.com/wp-content/uploads/2026/07/gfp-app-src-3062be8e.zip" || echo "EXIT:$?"
          echo '--- browser UA ---'
          curl -sSL -o s2.zip -w "HTTP:%{http_code} SIZE:%{size_download}\n" -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36" "https://getfitplans.com/wp-content/uploads/2026/07/gfp-app-src-3062be8e.zip" || echo "EXIT:$?"
          echo '--- headers ---'
          curl -sSI "https://getfitplans.com/wp-content/uploads/2026/07/gfp-app-src-3062be8e.zip" | head -20 || true
