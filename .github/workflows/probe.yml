name: Probe WAF

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Chunk size threshold
        run: |
          for kb in 9000 10000 11000 12000 14000; do
            head -c ${kb}000 /dev/zero > f.bin
            echo "=== ${kb}KB ==="
            curl -sS -o /dev/null -w "HTTP:%{http_code}\n" --max-time 120 -X POST -H "X-GFP-Deploy: probe" -H "Content-Type: application/octet-stream" --data-binary @f.bin "https://getfitplans.com/wp-json/gfp/v1/app-apk-chunk?buildId=deadbeef&idx=0" || echo "CURLEXIT:$?"
          done
