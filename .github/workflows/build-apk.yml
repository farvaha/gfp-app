name: Build GetFitPlans APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'gfp-app/**'
      - '.github/workflows/build-apk.yml'

concurrency:
  group: build-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gfp-app/package.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('gfp-app/package.json') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: gfp-app
        run: npm install

      - name: Patch cookies lib for Gradle 9 (jcenter removed)
        working-directory: gfp-app
        run: |
          sed -i 's/jcenter()/mavenCentral()/g' node_modules/@react-native-cookies/cookies/android/build.gradle
          grep -n 'mavenCentral()' node_modules/@react-native-cookies/cookies/android/build.gradle

      - name: Generate app icons
        working-directory: gfp-app
        run: node scripts/icons.js

      - name: Set versionCode from run number
        working-directory: gfp-app
        run: |
          node -e "
            const fs = require('fs');
            const a = JSON.parse(fs.readFileSync('app.json','utf8'));
            a.expo.android = a.expo.android || {};
            a.expo.android.versionCode = ${{ github.run_number }};
            fs.writeFileSync('app.json', JSON.stringify(a, null, 2));
          "

      - name: Generate native Android project
        working-directory: gfp-app
        run: npx expo prebuild --platform android --no-install

      - name: Ensure persistent release keystore
        id: keystore
        run: |
          if [ ! -f release.keystore ]; then
            keytool -genkeypair -v \
              -keystore release.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=GetFitPlans, O=GetFitPlans, C=IN"
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi
          cp release.keystore gfp-app/android/app/debug.keystore

      - name: Commit keystore back to repo (first run only)
        if: steps.keystore.outputs.generated == 'true'
        run: |
          git config user.name "gfp-ci"
          git config user.email "ci@getfitplans.com"
          git add release.keystore
          git commit -m "ci: persist release keystore"
          git push

      - name: Build release APK
        working-directory: gfp-app/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect artifact
        run: cp gfp-app/android/app/build/outputs/apk/release/app-release.apk GetFitPlans.apk

      - uses: actions/upload-artifact@v4
        with:
          name: GetFitPlans-APK
          path: GetFitPlans.apk
          retention-days: 30

      - name: Deliver APK to WordPress (chunked)
        env:
          GFP_TOKEN: ${{ secrets.GFP_DEPLOY_TOKEN }}
        run: |
          set -e
          BASE="https://getfitplans.com/wp-json/gfp/v1"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          SHA=$(sha256sum GetFitPlans.apk | cut -d' ' -f1)
          SIZE=$(stat -c%s GetFitPlans.apk)
          echo "apk size=$SIZE sha=$SHA"
          split -b 8000000 -d -a 3 GetFitPlans.apk part_

          # -L is essential: the proxy 307-redirects POSTs, and without following
          # the redirect the body is cut mid-upload and the chunk lands truncated.
          post() {
            curl -sS -L --max-time 180 -X POST \
              -A "$UA" \
              -H "Referer: https://getfitplans.com/" \
              -H "X-GFP-Deploy: $GFP_TOKEN" \
              "$@"
          }

          deliver() {
            BID=$(openssl rand -hex 12)
            echo "delivery buildId=$BID"
            i=0
            for f in part_*; do
              RESP=$(post -H "Content-Type: application/octet-stream" \
                          --data-binary @"$f" \
                          "$BASE/app-apk-chunk?buildId=$BID&idx=$i") || true
              if ! echo "$RESP" | grep -q '"ok":true'; then
                echo "chunk $i failed: $RESP"
                return 1
              fi
              echo "chunk $i ok"
              i=$((i+1))
            done
            RESP=$(post "$BASE/app-apk-finalize?buildId=$BID&versionCode=${{ github.run_number }}&versionName=1.3.0&sha256=$SHA&size=$SIZE") || true
            echo "$RESP"
            echo "$RESP" | grep -q '"ok":true'
          }

          # Any failure restarts the whole upload with a fresh buildId, so a partial
          # chunk can never be mistaken for a complete one.
          for attempt in 1 2 3; do
            if deliver; then
              echo "delivered on attempt $attempt"
              exit 0
            fi
            echo "delivery attempt $attempt failed; restarting clean"
            sleep 15
          done
          exit 1
